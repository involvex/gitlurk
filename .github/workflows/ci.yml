name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: |
          bun run --filter @gitlurk/shared build
          bun run --filter @gitlurk/git build
          bun run --filter @gitlurk/plugin-sdk build

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test
        run: bun test

      - name: Typecheck app
        run: bun run --filter @gitlurk/app typecheck

      - name: Build frontend
        run: bun run --filter @gitlurk/app build
